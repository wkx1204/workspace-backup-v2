<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程造价速算工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 20px; }
  .container { max-width: 520px; margin: 0 auto; }
  h1 { text-align: center; color: #1a1a2e; font-size: 22px; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #888; font-size: 12px; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .row { display: flex; gap: 10px; }
  .field { flex: 1; margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; }
  select, input { width: 100%; padding: 9px 12px; border: 1.5px solid #e8e8f0; border-radius: 10px; font-size: 14px; color: #1a1a2e; background: #fafafa; outline: none; transition: border-color 0.2s; }
  select:focus, input:focus { border-color: #4f6ef7; background: #fff; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .toggle-label { font-size: 14px; color: #333; }
  .toggle { position: relative; width: 48px; height: 26px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #ddd; border-radius: 26px; cursor: pointer; transition: 0.25s; }
  .toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.25s; }
  .toggle input:checked + .toggle-slider { background: #4f6ef7; }
  .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #4f6ef7, #6c5ce7); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; }
  .btn:hover { opacity: 0.88; }
  .result-card { background: linear-gradient(135deg, #1a1a2e, #2d2d5a); border-radius: 16px; padding: 24px; color: #fff; text-align: center; display: none; }
  .result-card.show { display: block; }
  .result-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
  .result-unit { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .result-total { font-size: 20px; color: rgba(255,255,255,0.85); margin-bottom: 16px; }
  .result-divider { width: 60px; height: 2px; background: rgba(255,255,255,0.2); margin: 0 auto 16px; }
  .result-detail { font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.8; }
  .result-warn { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 12px; }
  .sdk-ver { text-align: center; font-size: 11px; color: #bbb; margin-top: 20px; }
  .section-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; color: #888; background: #f5f5f8; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: #4f6ef7; color: #fff; font-weight: 600; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🏗️ 工程造价速算</h1>
  <div class="subtitle">南京官方造价指数校准 · 含安装选项</div>

  <div class="card">
    <div class="section-tabs">
      <div class="tab active" onclick="switchSection('build')">建筑工程</div>
      <div class="tab" onclick="switchSection('road')">道路场地</div>
    </div>

    <div id="build-section">
      <div class="field">
        <label>建筑类型</label>
        <select id="buildType" onchange="updateFloors()">
          <option value="普通住宅">普通住宅</option>
          <option value="办公楼">办公楼</option>
          <option value="钢结构厂房">钢结构厂房（单层）</option>
        </select>
      </div>
      <div class="field" id="floor-field">
        <label>楼层</label>
        <select id="floor">
          <option value="1-6层">1-6层</option>
          <option value="7-11层">7-11层</option>
          <option value="12-18层">12-18层</option>
          <option value="19-33层">19-33层</option>
        </select>
      </div>
      <div class="field">
        <label>装修标准</label>
        <select id="decorate">
          <option value="毛坯">毛坯</option>
          <option value="简装">简装</option>
          <option value="中档">中档</option>
          <option value="精装">精装</option>
        </select>
      </div>
    </div>

    <div id="road-section" class="hidden">
      <div class="field">
        <label>道路/场地类型</label>
        <select id="roadType">
          <option value="素混凝土场地10cm">素混凝土场地 10cm</option>
          <option value="素混凝土场地15cm">素混凝土场地 15cm</option>
          <option value="钢筋混凝土场地15cm">钢筋混凝土场地 15cm</option>
          <option value="混凝土道路15cm">混凝土道路 15cm</option>
          <option value="混凝土道路20cm">混凝土道路 20cm</option>
          <option value="混凝土道路25cm">混凝土道路 25cm</option>
          <option value="沥青路面4cm">沥青路面 4cm</option>
          <option value="沥青路面6cm">沥青路面 6cm</option>
          <option value="沥青路面双层8cm">沥青路面双层 8cm</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>城市</label>
        <select id="area">
          <option value="上海市">上海市</option>
          <option value="南京市">南京市</option>
          <option value="苏州市">苏州市</option>
          <option value="无锡市">无锡市</option>
          <option value="常州市">常州市</option>
          <option value="地级市">地级市</option>
          <option value="县城">县城</option>
        </select>
      </div>
      <div class="field">
        <label>年份</label>
        <select id="year">
          <option value="2020年">2020年</option>
          <option value="2021年">2021年</option>
          <option value="2022年">2022年</option>
          <option value="2023年" selected>2023年（基准）</option>
          <option value="2024年">2024年</option>
          <option value="2025年">2025年</option>
          <option value="2026年">2026年</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>材料行情</label>
        <select id="materialWave">
          <option value="下跌10%">下跌 10%</option>
          <option value="下跌5%">下跌 5%</option>
          <option value="持平" selected>持平</option>
          <option value="上涨5%">上涨 5%</option>
          <option value="上涨10%">上涨 10%</option>
        </select>
      </div>
      <div class="field">
        <label>建筑面积（㎡）</label>
        <input type="number" id="square" value="1000" min="1" max="100000">
      </div>
    </div>

    <div class="toggle-row" id="install-toggle">
      <span class="toggle-label">✅ 含安装工程</span>
      <label class="toggle">
        <input type="checkbox" id="includeInstall" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <button class="btn" onclick="calculate()">立即估算</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">单方造价</div>
    <div class="result-unit" id="resUnit">— 元/㎡</div>
    <div class="result-total" id="resTotal">— 万元</div>
    <div class="result-divider"></div>
    <div class="result-detail" id="resDetail"></div>
    <div class="result-warn">* 结果仅供参考，以实际预算为准</div>
  </div>

  <div class="sdk-ver">SDK V1.4 · 上海+苏南五城版</div>
</div>

<script src="sdk-v1.4.js"></script>
<script>
function switchSection(section) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (section === 'build') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('build-section').classList.remove('hidden');
    document.getElementById('road-section').classList.add('hidden');
    document.getElementById('install-toggle').style.display = '';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('build-section').classList.add('hidden');
    document.getElementById('road-section').classList.remove('hidden');
    document.getElementById('install-toggle').style.display = 'none';
  }
}

function updateFloors() {
  const bt = document.getElementById('buildType').value;
  const floorEl = document.getElementById('floor');
  if (bt === '钢结构厂房') {
    floorEl.innerHTML = '<option value="单层">单层</option>';
  } else {
    floorEl.innerHTML = '<option value="1-6层">1-6层</option><option value="7-11层">7-11层</option><option value="12-18层">12-18层</option><option value="19-33层">19-33层</option>';
  }
}

function calculate() {
  const isBuild = !document.querySelectorAll('.tab')[1].classList.contains('active');
  const params = {
    projectType: isBuild ? '建筑工程' : '道路场地工程',
    area: document.getElementById('area').value,
    year: document.getElementById('year').value,
    materialWave: document.getElementById('materialWave').value,
    square: parseFloat(document.getElementById('square').value) || 1000,
    includeInstall: document.getElementById('includeInstall').checked
  };

  if (isBuild) {
    params.buildType = document.getElementById('buildType').value;
    params.floor = document.getElementById('floor').value;
    params.decorate = document.getElementById('decorate').value;
  } else {
    params.roadType = document.getElementById('roadType').value;
  }

  const result = CostEstimateSDK.calculate(params);
  const card = document.getElementById('resultCard');

  if (!result) {
    card.classList.remove('show');
    alert('参数有误，请检查输入');
    return;
  }

  document.getElementById('resUnit').textContent = result.unitPrice;
  document.getElementById('resTotal').textContent = result.totalPrice;

  const detail = isBuild
    ? `${params.buildType} | ${params.floor} | ${params.decorate} | ${params.area} | ${params.year} | ${params.materialWave}`
    : `${params.roadType} | ${params.area} | ${params.year} | ${params.materialWave}`;
  document.getElementById('resDetail').textContent = detail;

  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
</body>
</html>
